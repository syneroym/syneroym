[tools]
# We can use Mise to manage Rust as well, but cargo/rustup usually uses rust-toolchain.toml.
# Adding it here ensures users without rustup get it installed via Mise.
rust = "stable"
"cargo:wasm-tools" = "latest"
"cargo:cargo-component" = "0.21"
"cargo:cargo-audit" = "latest"
"cargo:cargo-llvm-cov" = "latest"
node = "20"

[settings]
experimental = true

[tasks."test:rust"]
description = "Run all Rust unit and integration tests"
run = "cargo test --workspace"

[tasks."test:e2e"]
description = "Run Playwright WebRTC end-to-end browser tests"
run = "npm install && npm test"
dir = "crates/substrate/tests/e2e"

[tasks."test:e2e-ui"]
description = "Run Playwright E2E browser tests in UI Mode (headed/interactive)"
run = "npm install && npx playwright test --ui"
dir = "crates/substrate/tests/e2e"

[tasks."test:all"]
description = "Run both Rust and browser E2E test suites"
depends = ["test:rust", "test:e2e"]
