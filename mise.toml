[tools]
# We can use Mise to manage Rust as well, but cargo/rustup usually uses rust-toolchain.toml.
# Adding it here ensures users without rustup get it installed via Mise.
rust = "stable"
"cargo:wasm-tools" = "latest"
"cargo:cargo-component" = "0.21"
"cargo:cargo-audit" = "latest"
"cargo:cargo-llvm-cov" = "latest"
node = "20"

[settings]
experimental = true

[tasks."deps:update"]
description = """
Update all dependencies and re-apply version pins required by iroh v0.97's
pre-release crypto chain. iroh pulls in ed25519-dalek v3.0.0-pre.1, which
requires ed25519 ^3.0.0-rc.0 and pkcs8 ^0.11.0-rc.10. A plain `cargo update`
bumps those to their stable releases, which have breaking API changes against
the pre-release dalek. The two `--precise` commands below restore compatible
versions. Remove these pins once iroh ships a release using stable ed25519-dalek v3.
"""
run = [
  "cargo update",
  "cargo update 'ed25519@3.0.0-rc.4'",
  "cargo update 'pkcs8@0.11.0-rc.11'",
]

[tasks."test:rust"]
description = "Run all Rust unit and integration tests"
run = "cargo test --workspace"

[tasks."test:e2e"]
description = "Run Playwright WebRTC end-to-end browser tests"
run = "npm install && npm test"
dir = "crates/substrate/tests/e2e"

[tasks."test:e2e-ui"]
description = "Run Playwright E2E browser tests in UI Mode (headed/interactive)"
run = "npm install && npx playwright test --ui"
dir = "crates/substrate/tests/e2e"

[tasks."test:all"]
description = "Run both Rust and browser E2E test suites"
depends = ["test:rust", "test:e2e"]

[tasks."bench:micro"]
description = "Run Criterion micro-benchmarks across the workspace"
run = "cargo bench --workspace"

[tasks."bench:latency"]
description = "Run Latency Overhead Tests"
run = "cargo run -p syneroym-perf -- latency"

[tasks."bench:concurrency"]
description = "Run Concurrency & Resource Profiling Tests"
run = "cargo run -p syneroym-perf -- concurrency"

[tasks."bench:soak"]
description = "Run Soak / Endurance Tests"
run = "cargo run -p syneroym-perf -- soak"

[tasks."release:build"]
description = "Build release binaries for syneroym-substrate and roymctl with target support"
run = "./scripts/build-release.sh \"${1:-}\""

