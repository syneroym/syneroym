[tools]
node = "24"
# We can use Mise to manage Rust as well, but cargo/rustup usually uses rust-toolchain.toml.
# Adding it here ensures users without rustup get it installed via Mise.
rust = "stable"
"cargo:wasm-tools" = "latest"
"cargo:cargo-component" = "0.21"
"cargo:cargo-audit" = "latest"

[settings]
experimental = true
