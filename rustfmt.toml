# Requires nightly to take effect, ignored on stable
unstable_features = true

# Group imports from the same crate together
# (e.g. `use std::fs; use std::io;` becomes `use std::{fs, io};`)
imports_granularity = "Crate"

# Separate imports into three groups: std/core, external crates, local crates
group_imports = "StdExternalCrate"

# Format code blocks inside doc comments
format_code_in_doc_comments = true

# Wrap long comments to max_width (default 100)
wrap_comments = true

# Attempt to wrap long string literals
format_strings = true

# Use short struct init syntax if possible
use_field_init_shorthand = true
