name: 'CI Lints and Audit'
description: 'Runs formatting, clippy lints, and security audit'
inputs:
  github_token:
    description: 'GitHub token for audit check'
    required: true
runs:
  using: "composite"
  steps:
    - name: Check Formatting
      run: cargo fmt --all -- --check
      shell: bash

    - name: Clippy Lints
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      shell: bash

    - name: Security Audit
      uses: rustsec/audit-check@v2.0.0
      with:
        # pnsreview [DONE]: Yes, token is technically optional for just failing the build, but required if we want it to create GitHub Check annotations on the PR with the audit results.
        token: ${{ inputs.github_token }}
