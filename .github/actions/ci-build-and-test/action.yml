name: 'CI Build and Test'
description: 'Compiles workspace and runs tests'
inputs:
  build_mode:
    description: 'Build mode (debug or release)'
    required: true
    default: 'debug'
runs:
  using: "composite"
  steps:
    - name: Build WASM Test Component
      run: cd test-components/greeter && cargo component build --release --target wasm32-wasip2
      shell: bash

    - name: Run Tests (Debug)
      if: ${{ inputs.build_mode != 'release' }}
      run: cargo test --workspace --all-targets --all-features
      shell: bash

    - name: Run Tests (Release)
      if: ${{ inputs.build_mode == 'release' }}
      run: cargo test --workspace --all-targets --all-features --release
      shell: bash
