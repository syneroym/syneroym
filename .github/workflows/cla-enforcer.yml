name: "Enforce CLA Checkbox"
on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-cla:
    name: Check CLA Agreement
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Verify PR description for checked CLA box
        uses: actions/github-script@v6
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            
            // Regex to strictly check that the CLA line is exact, on its own line, with the correct URL
            const claRegex = /^\s*- \[[xX]\] I have read and agree to the \[Syneroym CLA\]\(https:\/\/github\.com\/syneroym\/syneroym\/blob\/main\/CLA\.md\)\.\s*$/m;
            const hasAgreed = claRegex.test(body);
            
            if (!hasAgreed) {
              core.setFailed(
                "❌ CLA Agreement Missing or Modified! Please edit your Pull Request description and check the exact box indicating you agree to the Syneroym Contributor License Agreement, without modifying the text or URL."
              );
            } else {
              console.log("✅ CLA Agreement checkbox is correctly checked and unmodified.");
            }
