name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use-cross: false
          - target: macOS-universal
            os: macos-latest
            use-cross: false

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'macOS-universal' && 'x86_64-apple-darwin aarch64-apple-darwin' || matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build macOS binaries
        if: matrix.target == 'macOS-universal'
        run: |
          cargo build --release --target x86_64-apple-darwin -p syneroym-substrate -p roymctl
          cargo build --release --target aarch64-apple-darwin -p syneroym-substrate -p roymctl
          mkdir -p target/release-universal
          lipo -create target/x86_64-apple-darwin/release/syneroym-substrate target/aarch64-apple-darwin/release/syneroym-substrate -output target/release-universal/syneroym-substrate
          lipo -create target/x86_64-apple-darwin/release/roymctl target/aarch64-apple-darwin/release/roymctl -output target/release-universal/roymctl

      - name: Build Standard binaries
        if: matrix.target != 'macOS-universal' && !matrix.use-cross
        run: cargo build --release --target ${{ matrix.target }} -p syneroym-substrate -p roymctl

      - name: Build Cross-compiled binaries
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }} -p syneroym-substrate -p roymctl

      - name: Package Assets
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.target }}" = "macOS-universal" ]; then
            cp target/release-universal/syneroym-substrate dist/
            cp target/release-universal/roymctl dist/
            tar -czf syneroym-${{ matrix.target }}.tar.gz -C dist syneroym-substrate roymctl
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/syneroym-substrate.exe dist/
            cp target/${{ matrix.target }}/release/roymctl.exe dist/
            powershell -Command "Compress-Archive -Path dist/* -DestinationPath syneroym-${{ matrix.target }}.zip"
          else
            cp target/${{ matrix.target }}/release/syneroym-substrate dist/
            cp target/${{ matrix.target }}/release/roymctl dist/
            tar -czf syneroym-${{ matrix.target }}.tar.gz -C dist syneroym-substrate roymctl
          fi

      - name: Generate Checksums
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            sha256sum syneroym-${{ matrix.target }}.zip > syneroym-${{ matrix.target }}.zip.sha256
          else
            sha256sum syneroym-${{ matrix.target }}.tar.gz > syneroym-${{ matrix.target }}.tar.gz.sha256
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syneroym-${{ matrix.target }}
          path: syneroym-${{ matrix.target }}.*

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/syneroym-substrate
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: syneroym-*

      - name: Flatten Artifacts
        run: |
          mkdir -p release-dist
          find artifacts -type f -exec cp {} release-dist/ \;

      - name: Sign Binaries with Minisign
        shell: bash
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PASSPHRASE: ${{ secrets.MINISIGN_PASSPHRASE }}
        run: |
          if [ -n "$MINISIGN_PRIVATE_KEY" ]; then
            sudo apt-get update && sudo apt-get install -y minisign
            echo "$MINISIGN_PRIVATE_KEY" > minisign.key
            for file in release-dist/*.tar.gz release-dist/*.zip; do
              if [ -f "$file" ]; then
                if [ -n "$MINISIGN_PASSPHRASE" ]; then
                  # Decrypt key and sign if passphrase is provided
                  echo "$MINISIGN_PASSPHRASE" | minisign -s minisign.key -S -m "$file"
                else
                  # Unencrypted key
                  minisign -s minisign.key -S -m "$file"
                fi
              fi
            done
            rm -f minisign.key
          else
            echo "MINISIGN_PRIVATE_KEY secret not found, skipping signature step."
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

