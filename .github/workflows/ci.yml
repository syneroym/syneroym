name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      coverage:
        description: "Run code coverage and upload the report to Codecov"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
          components: clippy, rustfmt

      - name: Install cargo-component
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-component@0.21.1

      - name: Install cargo-llvm-cov
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.coverage }}
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        
      - name: Install wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Build WASM Test Component
        run: cd test-components/greeter && cargo component build --release --target wasm32-wasip2

      - name: Check Formatting
        run: cargo fmt --all -- --check
        
      - name: Clippy Lints
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        
      - name: Run Tests
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.coverage) }}
        run: cargo test --workspace --all-targets --all-features

      - name: Generate Code Coverage
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.coverage }}
        run: cargo llvm-cov --workspace --all-targets --all-features --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.coverage }}
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Security Audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
