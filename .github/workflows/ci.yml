name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Cargo build mode (debug or release)"
        required: false
        type: choice
        options:
          - debug
          - release
        default: debug
      coverage:
        description: "Run code coverage and upload the report to Codecov"
        required: false
        type: boolean
        default: false
      e2e:
        description: "Run Playwright E2E integration tests"
        required: false
        type: boolean
        default: false
      benchmarks:
        description: "Run benchmarks and performance tests"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-pipeline:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      # ========================================
      # 1. Base Setup (Shared for all)
      # ========================================
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
          components: clippy, rustfmt

      - name: Install cargo-component
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-component@0.21.1

      - name: Install cargo-llvm-cov
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.coverage == true }}
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      # ========================================
      # 2. Composite Actions
      # ========================================
      - name: Run Lints & Audit
        uses: ./.github/actions/ci-lints
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Note: 'Run Build & Test' and 'Run Code Coverage' are mutually exclusive.
      # `cargo llvm-cov` inherently runs the test suite. If coverage is requested,
      # we skip the standard test step to avoid running all tests twice.
      - name: Run Build & Test
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.coverage == true) }}
        uses: ./.github/actions/ci-build-and-test
        with:
          release_flag: ${{ github.event.inputs.build_mode == 'release' && '--release' || '' }}

      - name: Run Code Coverage
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.coverage == true }}
        uses: ./.github/actions/ci-coverage
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_flag: ${{ github.event.inputs.build_mode == 'release' && '--release' || '' }}

      - name: Run Playwright E2E
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.e2e == true }}
        uses: ./.github/actions/ci-e2e

      - name: Run Benchmarks
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmarks == true }}
        uses: ./.github/actions/ci-benchmarks
        with:
          release_flag: ${{ github.event.inputs.build_mode == 'release' && '--release' || '' }}
