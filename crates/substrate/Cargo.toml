[package]
name = "syneroym-substrate"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
serde.workspace = true
clap.workspace = true
anyhow.workspace = true
async-trait.workspace = true
tokio.workspace = true
syneroym-identity.workspace = true
serde_json.workspace = true
dirs.workspace = true
toml.workspace = true
syneroym-core = { path = "../core" }
syneroym-router = { path = "../router" }
syneroym-observability = { path = "../observability" }
syneroym-community-registry = { path = "../community_registry", optional = true }
syneroym-coordinator = { path = "../coordinator", optional = true, default-features = false }
syneroym-client-gateway = { path = "../client_gateway", optional = true }
syneroym-app-sandbox = { path = "../app_sandbox", optional = true }
tracing.workspace = true
reqwest.workspace = true
z32.workspace = true
rustls.workspace = true

[features]
default = [
    "community_registry",
    "app_sandbox",
    "coordinator_all",
    "client_gateway",
]
minimal = ["client_gateway"]
community_registry = ["dep:syneroym-community-registry"]
client_gateway = ["dep:syneroym-client-gateway"]
app_sandbox = ["dep:syneroym-app-sandbox"]
coordinator = ["dep:syneroym-coordinator"]
coordinator_iroh = ["coordinator", "syneroym-coordinator/iroh"]
coordinator_webrtc = ["coordinator", "syneroym-coordinator/webrtc"]
coordinator_all = [
    "coordinator",
    "syneroym-coordinator/iroh",
    "syneroym-coordinator/webrtc",
]

[dev-dependencies]
assert_cmd.workspace = true
libc.workspace = true
predicates.workspace = true
tempfile.workspace = true
iroh.workspace = true
tracing-subscriber.workspace = true
syneroym-rpc = { path = "../rpc" }
syneroym-bindings = { path = "../bindings" }
syneroym-sdk = { path = "../sdk" }
miniapp-demo1-web = { path = "../../test-components/miniapp-demo1-web" }
tokio-tungstenite.workspace = true
futures-util.workspace = true
futures.workspace = true
webrtc.workspace = true
syneroym-coordinator-webrtc = { path = "../coordinator_webrtc" }
chromiumoxide.workspace = true
tokio-stream.workspace = true
axum.workspace = true
