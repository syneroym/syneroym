[package]
name = "syneroym-substrate"
version = "0.1.0"
edition = "2024"

[dependencies]
serde.workspace = true
clap.workspace = true
anyhow.workspace = true
async-trait = "0.1"
tokio.workspace = true
syneroym-identity.workspace = true
serde_json.workspace = true
dirs = "6.0.0"
toml = "1.0.7"
syneroym-core = { path = "../core" }
syneroym-router = { path = "../router" }
syneroym-observability = { path = "../observability" }
syneroym-community-registry = { path = "../community_registry", optional = true }
syneroym-coordinator = { path = "../coordinator", optional = true, default-features = false }
syneroym-client-gateway = { path = "../client_gateway", optional = true }
syneroym-app-sandbox = { path = "../app_sandbox", optional = true }
tracing.workspace = true

[features]
default = [
    "community_registry",
    "app_sandbox",
    "coordinator_all",
    "client_gateway",
]
minimal = ["client_gateway"]
community_registry = ["dep:syneroym-community-registry"]
client_gateway = ["dep:syneroym-client-gateway"]
app_sandbox = ["dep:syneroym-app-sandbox"]
coordinator = ["dep:syneroym-coordinator"]
coordinator_iroh = ["coordinator", "syneroym-coordinator/iroh"]
coordinator_webrtc = ["coordinator", "syneroym-coordinator/webrtc"]
coordinator_all = [
    "coordinator",
    "syneroym-coordinator/iroh",
    "syneroym-coordinator/webrtc",
]

[dev-dependencies]
assert_cmd = "2.2"
libc = "0.2.184"
predicates = "3.1"
tempfile = "3.10"
iroh.workspace = true
tracing-subscriber.workspace = true
syneroym-rpc = { path = "../rpc" }
syneroym-bindings = { path = "../bindings" }
