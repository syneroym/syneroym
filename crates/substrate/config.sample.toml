# Syneroym Substrate Configuration
# Typically this file is saved at {app_config_dir}/config.toml, where {app_config_dir} depends on the OS.

# Config file version
config_version = 1

# Base directories
# These can be provided or omitted to use platform defaults. These are prepended to other relative paths as appropriate.

# Config files directory
app_config_dir = "./workdir/config"
# Long term data storage (database, etc.)
app_local_data_dir = "./workdir/data"
# Short term, or user specific storage (identity keys, etc.)
app_data_dir = "./workdir/user_data"
# Cache or temporary files
app_cache_dir = "./workdir/cache"
# Logs directory
app_log_dir = "./workdir/logs"

# Profile corresponds to set of roles this substrate is supposed to play. 
# Create custom profiles with a specific role list. Roles are configured in [roles.rolename] sections.
# Common values: "full" (all roles), "enduser" (gateway + observability), "app_sandbox" (sandbox + gateway)
profile = "full"

[identity]
# Path to the node's private key. If it doesn't exist, one will be generated.
# Used to derive the node's DID. Equivalent to CLI `--key <path>`
key = "substrate.key"
# Candidate controller DID. Only used if agreement is not provided.
# Must be treated as UNVERIFIED until an agreement is established. Equivalent to CLI `--controller <did>`
controller_did = ""
# Path to ControllerAgreement JSON binding node DID to controller DID.
# Equivalent to CLI `--agreement <path>`
agreement = "substrate-controller-agreement.json"
# If true, the node MUST NOT start without a valid ControllerAgreement.
# Equivalent to CLI `--require-agreement`
require_agreement = false

[storage]
# Currently only "sqlite" is supported
engine = "sqlite"
# For database storage. If relative path is given, it will go under app_local_data_dir.
db_dir = "db"
# Default location for large object or file storage (e.g. WASM binaries). If relative path is given, it will go under app_local_data_dir.
blobs_dir = "blobs"

[logging]
# Default log level: "error", "warn", "info", "debug", "trace"
level = "info"
# Log format: "json" or "pretty"
format = "pretty"
# Log target: "stdout" or "file"
target = "stdout"

# Global substrate configuration
[substrate]
# List of enabled communication interfaces to channel traffic. Supported: ["iroh", "webrtc"]
communication_interfaces = ["iroh", "webrtc"]
# Optional URL of a community registry to publish this substrate's endpoint to.
registry_url = "http://localhost:7961"

# A node that connect to the internet should configure uplink bridges to act as their gateway to the larger network
# Note: Uplink-bridge functionality is WIP.
[uplink]

# Iroh communication configuration for uplink/signaling
[uplink.iroh]
# The relay/signaling URL for Iroh connections.
relay_url = "http://localhost:7964"

# WebRTC communication configuration
[uplink.webrtc]
# The signaling server URL for establishing WebRTC peer-to-peer connections.
signaling_server_url = "ws://localhost:7963"
# The bootstrap page URL for WebRTC clients.
bootstrap_page_url = "ws://localhost:7962"
# List of STUN servers to use for NAT traversal.
stun_servers = ["stun:stun.l.google.com:19302"]

[uplink.ble]
enabled = false
bridge = "ble://A4:C1:38:12:34:56/some-service-uuid"

[uplink.lora]
enabled = false
bridge = "lora://70B3D57ED0051234"

# Profile definitions: allow group roles into named profiles
[profiles.enduser]
roles = ["client_gateway", "observability"]

[profiles.app_sandbox]
roles = ["app_sandbox", "client_gateway", "observability"]

# Profile to enable all services. Useful in large deployments or dev, test, demos.
[profiles.full]
roles = [
    "app_sandbox",
    "community_registry",
    "coordinator",
    "client_gateway",
    "observability",
]

# ____ Role configs ____

# Resources limits across all services in the application sandbox
[roles.app_sandbox]
# Use wRPC sandbox for WASM components
wrpc_sandbox = true
# CPU core limit for the sandbox
cpu_limit = 1
# Memory limit for the sandbox (e.g. "1Gi", "512Mi")
memory_limit = "1Gi"
# Maximum number of concurrent WASM instances
max_concurrent_instances = 10

# Service Registry: allows services to be discovered within the ecosystem
[roles.community_registry]
# Access control: "everyone" or a list of DIDs [ "did:key:...", ... ]
access = "everyone"
# Registry HTTP bind address
http_bind_address = "0.0.0.0:7961"

# Coordinator: Rendezvous and relay service for peer-to-peer connection establishment
[roles.coordinator]
# Access control for the coordinator service
access = "everyone"

# TLS configuration for coordinator HTTPS/WSS endpoints
# [roles.coordinator.tls]
# cert_path = "tls/cert.pem"
# key_path = "tls/key.pem"

# Iroh coordinator configuration
[roles.coordinator.iroh]
# Enable Iroh signaling (HTTP)
enable_signalling = true
# Enable Iroh relaying (QUIC)
enable_relay = true
# HTTP signaling bind address
http_bind_address = "0.0.0.0:7964"
# QUIC relay bind address
quic_bind_address = "0.0.0.0:7965"

# WebRTC coordinator configuration
[roles.coordinator.webrtc]
# Enable WebRTC signaling (WebSocket)
enable_signalling = true
# Enable WebRTC relaying
enable_relay = true
# Signaling WebSocket bind address
signalling_bind_address = "0.0.0.0:7963"
# Bootstrap page HTTP bind address
bootstrap_page_bind_address = "0.0.0.0:7962"

# Transport bridge for peers who cannot connect directly (e.g. strict NAT traversal)
# [roles.coordinator.transport_bridge]
# translations = [{ from = "quic", to = "lora" }, { from = "lora", to = "quic" }]

# Client Gateway: Reverse proxy for external HTTP/JSON-RPC access to internal services
[roles.client_gateway]
# HTTP port for the gateway
http_port = 7960

# Observability: Health checks, metrics, and tracing
[roles.observability]

# Health check endpoint configuration
[roles.observability.health]
enabled = true
# Address to bind the health check server
bind_address = "0.0.0.0:7966"
# HTTP path for health checks
endpoint = "/health"

# Metrics (Prometheus) configuration
[roles.observability.metrics]
enabled = true
# Address to bind the metrics server
bind_address = "0.0.0.0:7967"
# HTTP path for metrics scraping
endpoint = "/metrics"

# Tracing (OpenTelemetry) configuration
[roles.observability.tracing]
# Enable tracing
enabled = false
# Service name for traces
service_name = "syneroym_substrate"

# [roles.observability.tracing.otlp]
# endpoint = "http://localhost:4318"
# protocol = "http"

[roles.observability.tracing.sampling]
# Sampling strategy: "parent_based", "always_on", "always_off"
strategy = "parent_based"
# Sampling ratio (0.0 to 1.0)
ratio = 0.1
