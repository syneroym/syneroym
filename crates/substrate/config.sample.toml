# Syneroym Substrate Configuration
# Typically this file is saved at {app_config_dir}/config.toml, where {app_config_dir} depends on the OS.

# Config file version
config_version = 1

# Base directories
# These can be provided or omitted to use platform defaults. These are prepended to other relative paths as appropriate.

# Config files
app_config_dir = "./workdir/config"
# Long term data storage
app_local_data_dir = "./workdir/data"
# Short term, or user specific storage
app_data_dir = "./workdir/user_data"
# Cache or temporary files
app_cache_dir = "./workdir/cache"
# Logs
app_log_dir = "./workdir/logs"

# Profile corresponds to set of roles this substrate is supposed to play. 
# Create custom profiles with a specific role list. Roles are configured in [role.rolename] sections
profile = "app_sandbox"

[identity]
# Path to the node's private key. If it doesn't exist, one will be generated.
# Used to derive the node's DID. Equivalent to CLI `--key <path>`
key = ""
# Candidate controller DID. Only used if agreement is not provided.
# Must be treated as UNVERIFIED. Equivalent to CLI `--controller <did>`
controller_did = ""
# Path to ControllerAgreement JSON binding node DID to controller DID.
# Equivalent to CLI `--agreement <path>`
agreement = "substrate-controller-agreement.json"
# If true, the node MUST NOT start without a valid ControllerAgreement.
# Equivalent to CLI `--require-agreement`
require_agreement = false

[storage]
# Currently only sqlite
engine = "sqlite"
# For database storage. If relative path is given, it will go under app_local_data_dir
db_dir = "db"
# Default location for large object or file storage is. If relative path is given, it will go under app_local_data_dir
blobs_dir = "blobs"

[logging]
# Default log level if RUST_LOG is not set: "error", "warn", "info", "debug", "trace"
level = "info"
format = "json"   # json or pretty
target = "stdout" # stdout or file

# Global substrate configuration
[substrate]
# List of enabled communication interfaces to channel traffic
communication_interfaces = ["iroh", "webrtc"]

# A node that connect to the internet should configure uplink bridges to act as their gateway to the larger network
# Note: Uplink-bridge functionality is WIP.
[uplink]

# Coordination/Signalling and data relay.
# Data relay could convert transport (e.g. iroh -> webrtcdatachannel or message/stream/MTU conversion)
[uplink.iroh]
relay_url = "http://localhost:3340"

# WebRTC communication configuration
[uplink.webrtc]
signaling_server_url = "ws://localhost:7444"
bootstrap_page_url = "ws://localhost:7002"
stun_servers = ["stun:stun.l.google.com:19302"]

[uplink.ble]
enabled = false
bridge = "ble://A4:C1:38:12:34:56/some-service-uuid"

[uplink.lora]
enabled = false
bridge = "lora://70B3D57ED0051234"

# Profile to enable only the syneroym ecosystem http access service
[profiles.enduser]
roles = ["client_gateway", "observability"]

[profiles.app_sandbox]
roles = ["app_sandbox", "client_gateway", "observability"]

# Profile to enable all services. Useful in large deployments or dev, test, demos
[profiles.full]
roles = [
    "app_sandbox",
    "community_registry",
    "coordinator",
    "client_gateway",
    "observability",
]

# ____ Role configs ____

# Resources limits across all services in app sandbox
[roles.app_sandbox]
wrpc_sandbox = true
cpu_limit = 1
memory_limit = "1Gi"

# Service Registry
[roles.community_registry]
access = "everyone" # Later, more access restriction like list of dids

# Coordinator/Rendezvous service for connection establishment
[roles.coordinator]
access = "everyone" # Or for specific DIDs, access = ["did1", "did2", "..."]

# TLS configuration for https endpoints of all coordinators
[roles.coordinator.tls]
cert_path = "tls/cert.pem"
key_path = "tls/key.pem"

[roles.coordinator.iroh]
enable_signalling = false
enable_relay = false
http_bind_address = "0.0.0.0:7443"
quic_bind_address = "0.0.0.0:7842"

[roles.coordinator.webrtc]
enable_signalling = false
enable_relay = false
signalling_bind_address = "0.0.0.0:7444"
bootstrap_page_bind_address = "0.0.0.0:7002"

# Transport bridge for other peers who cannot connect directly with each other. Typically peers behind strict NATs.
# Note: Uplink-bridge functionality is WIP.
[roles.coordinator.transport_bridge]
translations = [{ from = "quic", to = "lora" }, { from = "lora", to = "quic" }]

# Proxy service for easy access to syneroym ecosystem services by external clients like browsers. Only local access is allowed for substrate admin APIs
[roles.client_gateway]
http_port = 7000

# ____ Observability ____
[roles.observability]

# ____ Health ____
[roles.observability.health]
enabled = true
bind_address = "0.0.0.0:7081" # where /health is exposed
endpoint = "/health"


# ____ Metrics (Prometheus) ____
[roles.observability.metrics]
enabled = true
bind_address = "0.0.0.0:7082" # where /metrics is exposed
endpoint = "/metrics"

# ____ Tracing (OpenTelemetry) ____
[roles.observability.tracing]
enabled = false
service_name = "syneroym_substrate"

[roles.observability.tracing.otlp]
endpoint = "http://${OTEL_COLLECTOR_SVC_DID}"
protocol = "http"                             # Currently there is only a HTTP adapter for third party tools

[roles.observability.tracing.sampling]
strategy = "parent_based"
ratio = 0.1
