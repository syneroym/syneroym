<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bootstrapping peer...</title>
    <script>
        const SIGNALING_SERVER_URL = "{{ signaling_server_url }}";
        const TARGET_PEER_ID = "{{ target_peer_id }}";
        const TARGET_SERVICE_ID = "{{ target_service_id }}";
        const HTTP_VERSION = "{{ http_version }}";
        const FORCE_TUNNEL = false;
        const MY_ID = "gateway-" + Math.random().toString(36).substr(2, 9);
        window.logs = [];
        const originalLog = console.log;
        console.log = function (...args) {
            window.logs.push(args.map(a => String(a)).join(' '));
            originalLog.apply(console, args);
        };
        const originalDebug = console.debug;
        console.debug = function (...args) {
            window.logs.push('[DEBUG] ' + args.map(a => String(a)).join(' '));
            originalDebug.apply(console, args);
        };
        const originalError = console.error;
        console.error = function (...args) {
            window.logs.push('[ERROR] ' + args.map(a => String(a)).join(' '));
            originalError.apply(console, args);
        };
        window.addEventListener('error', (event) => {
            window.logs.push('[JS ERROR] ' + event.message + ' at ' + event.filename + ':' + event.lineno);
        });
        window.addEventListener('unhandledrejection', (event) => {
            window.logs.push('[JS UNHANDLED REJECTION] ' + event.reason);
        });

        // ------------------ RFC6455 Frame Encoder & Decoder ------------------

        function encodeWSFrame(data, opcode = 1) {
            let payload;
            if (typeof data === 'string') {
                payload = new TextEncoder().encode(data);
            } else if (data instanceof ArrayBuffer) {
                payload = new Uint8Array(data);
            } else if (ArrayBuffer.isView(data)) {
                payload = new Uint8Array(data.buffer, data.byteOffset, data.byteLength);
            } else {
                payload = new Uint8Array(data);
            }

            const len = payload.length;
            const header = [];
            header.push(0x80 | opcode);

            if (len <= 125) {
                header.push(0x80 | len);
            } else if (len <= 65535) {
                header.push(0x80 | 126);
                header.push((len >> 8) & 0xFF);
                header.push(len & 0xFF);
            } else {
                header.push(0x80 | 127);
                header.push(0, 0, 0, 0);
                header.push((len >> 24) & 0xFF);
                header.push((len >> 16) & 0xFF);
                header.push((len >> 8) & 0xFF);
                header.push(len & 0xFF);
            }

            const mask = new Uint8Array(4);
            window.crypto.getRandomValues(mask);
            header.push(...mask);

            const frame = new Uint8Array(header.length + len);
            frame.set(header, 0);
            for (let i = 0; i < len; i++) {
                frame[header.length + i] = payload[i] ^ mask[i % 4];
            }
            return frame;
        }

        class WSFrameDecoder {
            constructor(onFrame) {
                this.onFrame = onFrame;
                this.buffer = new Uint8Array(0);
            }

            addBytes(bytes) {
                const newBuf = new Uint8Array(this.buffer.length + bytes.length);
                newBuf.set(this.buffer, 0);
                newBuf.set(bytes, this.buffer.length);
                this.buffer = newBuf;

                while (this.buffer.length >= 2) {
                    const byte1 = this.buffer[0];
                    const byte2 = this.buffer[1];
                    const fin = (byte1 & 0x80) !== 0;
                    const opcode = byte1 & 0x0F;
                    const hasMask = (byte2 & 0x80) !== 0;
                    let payloadLen = byte2 & 0x7F;

                    let headerLen = 2;
                    if (payloadLen === 126) {
                        if (this.buffer.length < 4) break;
                        payloadLen = (this.buffer[2] << 8) | this.buffer[3];
                        headerLen = 4;
                    } else if (payloadLen === 127) {
                        if (this.buffer.length < 10) break;
                        let low = (this.buffer[6] << 24) | (this.buffer[7] << 16) | (this.buffer[8] << 8) | this.buffer[9];
                        payloadLen = low;
                        headerLen = 10;
                    }

                    let mask = null;
                    if (hasMask) {
                        if (this.buffer.length < headerLen + 4) break;
                        mask = this.buffer.slice(headerLen, headerLen + 4);
                        headerLen += 4;
                    }

                    if (this.buffer.length < headerLen + payloadLen) break;

                    let payload = this.buffer.slice(headerLen, headerLen + payloadLen);
                    this.buffer = this.buffer.slice(headerLen + payloadLen);

                    if (hasMask && mask) {
                        for (let i = 0; i < payload.length; i++) {
                            payload[i] ^= mask[i % 4];
                        }
                    }

                    this.onFrame({ fin, opcode, payload });
                }
            }
        }

        // ------------------ End-to-End Cryptography Helpers ------------------

        async function encryptChunk(key, plaintext) {
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const ciphertext = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv },
                key,
                plaintext
            );
            const ciphertextBytes = new Uint8Array(ciphertext);
            const payloadLen = 12 + ciphertextBytes.byteLength;

            const chunk = new Uint8Array(2 + payloadLen);
            chunk[0] = (payloadLen >> 8) & 0xFF;
            chunk[1] = payloadLen & 0xFF;
            chunk.set(iv, 2);
            chunk.set(ciphertextBytes, 14);
            return chunk;
        }

        async function decryptChunk(key, bytes) {
            if (bytes.length < 12) throw new Error("Chunk too short");
            const iv = bytes.slice(0, 12);
            const ciphertext = bytes.slice(12);
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv },
                key,
                ciphertext
            );
            return new Uint8Array(decrypted);
        }

        class Decryptor {
            constructor(key, onDecrypted) {
                this.key = key;
                this.onDecrypted = onDecrypted;
                this.buffer = new Uint8Array(0);
            }

            async addBytes(bytes) {
                const newBuf = new Uint8Array(this.buffer.length + bytes.length);
                newBuf.set(this.buffer, 0);
                newBuf.set(bytes, this.buffer.length);
                this.buffer = newBuf;

                while (this.buffer.length >= 2) {
                    const payloadLen = (this.buffer[0] << 8) | this.buffer[1];
                    if (this.buffer.length < 2 + payloadLen) {
                        break;
                    }

                    const payload = this.buffer.slice(2, 2 + payloadLen);
                    this.buffer = this.buffer.slice(2 + payloadLen);

                    try {
                        const decrypted = await decryptChunk(this.key, payload);
                        this.onDecrypted(decrypted);
                    } catch (e) {
                        console.error("Decryption error:", e);
                        throw e;
                    }
                }
            }
        }

        // ------------------ Unified Connection / Tunnel Manager ------------------

        let peerConnection;
        let ws;
        let isConnected = false;
        let connectionPromise = null;

        async function connectTunnel(preamble, isRaw, onData, onClose) {
            if (isConnected && peerConnection && peerConnection.connectionState === 'connected') {
                try {
                    return await new Promise((resolve, reject) => {
                        const dcLabel = "tunnel-" + Math.random().toString(36).substr(2, 5);
                        const dc = peerConnection.createDataChannel(dcLabel);
                        let closed = false;

                        dc.onopen = () => {
                            console.debug(`[Page] WebRTC DC Open: ${dcLabel}`);
                            // Clean preamble: WebRTC data channels are already DTLS encrypted, no ECDH is needed
                            const cleanPreamble = preamble.split('?')[0] + '\n';
                            dc.send(new TextEncoder().encode(cleanPreamble));

                            resolve({
                                send: (data) => {
                                    if (dc.readyState === 'open') {
                                        dc.send(data);
                                    }
                                },
                                close: () => {
                                    closed = true;
                                    dc.close();
                                }
                            });
                        };

                        dc.onmessage = (event) => {
                            if (closed) return;
                            onData(new Uint8Array(event.data));
                        };

                        dc.onclose = () => {
                            if (closed) return;
                            closed = true;
                            onClose();
                        };

                        dc.onerror = (e) => {
                            console.error("DC Error:", e);
                            dc.close();
                            reject(e);
                        };
                    });
                } catch (e) {
                    console.warn("WebRTC data channel creation failed, falling back to secure blind tunnel", e);
                }
            }

            return new Promise((resolve, reject) => {
                console.debug("[Page][BlindTunnel] Opening fallback secure blind tunnel via coordinator...");
                let closed = false;

                let finalPreamble = preamble;
                let clientKeyPair = null;
                let sharedSecret = null;
                let decryptor = null;

                const runFallback = async () => {
                    if (preamble.includes("enc=ecdh-p256")) {
                        clientKeyPair = await window.crypto.subtle.generateKey(
                            { name: "ECDH", namedCurve: "P-256" },
                            true,
                            ["deriveKey", "deriveBits"]
                        );
                        const clientPubRaw = await window.crypto.subtle.exportKey("raw", clientKeyPair.publicKey);
                        const clientPubHex = Array.from(new Uint8Array(clientPubRaw)).map(b => b.toString(16).padStart(2, '0')).join('');

                        finalPreamble = preamble.replace(/pubkey=[^ \n]*/, `pubkey=${clientPubHex}`);
                    }

                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const tunnelUrl = `${protocol}//${window.location.host}/__syneroym/tunnel`;
                    console.debug(`[Page][BlindTunnel] Connecting WebSocket to tunnel URL: ${tunnelUrl}`);

                    const tunnelWS = new NativeWebSocket(tunnelUrl);
                    tunnelWS.binaryType = 'arraybuffer';

                    let serverKeyBytes = new Uint8Array(0);

                    tunnelWS.onopen = () => {
                        console.debug(`[Page][BlindTunnel] WS open. Sending preamble: ${finalPreamble.trim()}`);
                        tunnelWS.send(new TextEncoder().encode(finalPreamble));
                        if (!clientKeyPair) {
                            resolve({
                                send: async (data) => {
                                    if (tunnelWS.readyState === NativeWebSocket.OPEN) {
                                        tunnelWS.send(data);
                                    }
                                },
                                close: () => {
                                    closed = true;
                                    tunnelWS.close();
                                }
                            });
                        }
                    };

                    tunnelWS.onmessage = async (event) => {
                        if (closed) return;
                        const bytes = new Uint8Array(event.data);

                        if (clientKeyPair && !sharedSecret) {
                            const combined = new Uint8Array(serverKeyBytes.length + bytes.length);
                            combined.set(serverKeyBytes, 0);
                            combined.set(bytes, serverKeyBytes.length);
                            serverKeyBytes = combined;

                            if (serverKeyBytes.length >= 65) {
                                const serverPubBytes = serverKeyBytes.slice(0, 65);
                                const leftovers = serverKeyBytes.slice(65);

                                const serverPub = await window.crypto.subtle.importKey(
                                    "raw",
                                    serverPubBytes,
                                    { name: "ECDH", namedCurve: "P-256" },
                                    true,
                                    []
                                );

                                sharedSecret = await window.crypto.subtle.deriveKey(
                                    { name: "ECDH", public: serverPub },
                                    clientKeyPair.privateKey,
                                    { name: "AES-GCM", length: 256 },
                                    false,
                                    ["encrypt", "decrypt"]
                                );

                                decryptor = new Decryptor(sharedSecret, (decrypted) => {
                                    if (!closed) onData(decrypted);
                                });

                                console.debug("[Page][BlindTunnel] E2E ECDH key negotiated! Encrypted tunnel ready.");

                                resolve({
                                    send: async (data) => {
                                        if (tunnelWS.readyState === NativeWebSocket.OPEN) {
                                            if (sharedSecret) {
                                                const encrypted = await encryptChunk(sharedSecret, data);
                                                tunnelWS.send(encrypted);
                                            } else {
                                                tunnelWS.send(data);
                                            }
                                        }
                                    },
                                    close: () => {
                                        closed = true;
                                        tunnelWS.close();
                                    }
                                });

                                if (leftovers.length > 0) {
                                    await decryptor.addBytes(leftovers);
                                }
                            }
                        } else {
                            if (sharedSecret) {
                                await decryptor.addBytes(bytes);
                            } else {
                                onData(bytes);
                            }
                        }
                    };

                    tunnelWS.onclose = () => {
                        console.debug("[Page][BlindTunnel] WS closed");
                        if (closed) return;
                        closed = true;
                        onClose();
                    };

                    tunnelWS.onerror = (e) => {
                        console.error("[Page][BlindTunnel] WS error:", e);
                        tunnelWS.close();
                        reject(e);
                    };
                };

                runFallback().catch(reject);
            });
        }

        // ------------------ SynWebSocket Implementation & Monkeypatching ------------------

        class SynWebSocket extends EventTarget {
            constructor(urlStr, protocols) {
                super();
                const url = new URL(urlStr);
                this.url = urlStr;
                this.readyState = 0;
                this.extensions = "";
                this.protocol = "";
                this.binaryType = "blob";

                this.onopen = null;
                this.onmessage = null;
                this.onerror = null;
                this.onclose = null;

                const hostname = url.hostname;
                let hostBase = hostname.endsWith('.localhost') ? hostname.slice(0, -10) : hostname;
                let parts = hostBase.split('-');
                let interfaceName = '';
                if (parts.length > 1 && parts[parts.length - 1].startsWith('i') && parts[parts.length - 1].length > 1) {
                    interfaceName = parts.pop().substring(1);
                }
                let serviceId = TARGET_SERVICE_ID;

                const preamble = `raw://${interfaceName}|${serviceId}?enc=ecdh-p256&pubkey=placeholder\n`;

                let headerBuffer = new Uint8Array(0);
                let handshakeComplete = false;

                const decoder = new WSFrameDecoder((frame) => {
                    if (frame.opcode === 8) {
                        this.readyState = 3;
                        const event = new CloseEvent('close', { code: 1000, reason: "Normal closure" });
                        if (this.onclose) this.onclose(event);
                        this.dispatchEvent(event);
                        this.tunnel.close();
                    } else if (frame.opcode === 1 || frame.opcode === 2) {
                        let data = frame.payload;
                        if (frame.opcode === 1) {
                            data = new TextDecoder().decode(frame.payload);
                        } else if (this.binaryType === 'blob') {
                            data = new Blob([frame.payload]);
                        } else if (this.binaryType === 'arraybuffer') {
                            data = frame.payload.buffer;
                        }
                        const event = new MessageEvent('message', { data, origin: url.origin });
                        if (this.onmessage) this.onmessage(event);
                        this.dispatchEvent(event);
                    }
                });

                const onData = (bytes) => {
                    if (!handshakeComplete) {
                        const newBuf = new Uint8Array(headerBuffer.length + bytes.length);
                        newBuf.set(headerBuffer, 0);
                        newBuf.set(bytes, headerBuffer.length);
                        headerBuffer = newBuf;

                        const doubleCRLF = findDoubleCRLF(headerBuffer);
                        if (doubleCRLF !== -1) {
                            const responseHeader = new TextDecoder().decode(headerBuffer.slice(0, doubleCRLF));
                            if (responseHeader.includes("101 Switching Protocols")) {
                                console.debug("[SynWebSocket] Upgrade handshake complete!");
                                handshakeComplete = true;
                                this.readyState = 1;

                                const event = new Event('open');
                                if (this.onopen) this.onopen(event);
                                this.dispatchEvent(event);

                                const leftovers = headerBuffer.slice(doubleCRLF + 4);
                                if (leftovers.length > 0) {
                                    decoder.addBytes(leftovers);
                                }
                            } else {
                                console.error("[SynWebSocket] Bad upgrade response:", responseHeader);
                                this.readyState = 3;
                                const event = new Event('error');
                                if (this.onerror) this.onerror(event);
                                this.dispatchEvent(event);
                                this.tunnel.close();
                            }
                        }
                    } else {
                        decoder.addBytes(bytes);
                    }
                };

                const onClose = () => {
                    this.readyState = 3;
                    const event = new CloseEvent('close', { code: 1006, reason: "Abrupt closure" });
                    if (this.onclose) this.onclose(event);
                    this.dispatchEvent(event);
                };

                connectTunnel(preamble, true, onData, onClose).then((tunnel) => {
                    this.tunnel = tunnel;

                    const secKey = btoa(Array.from(window.crypto.getRandomValues(new Uint8Array(16))).map(b => String.fromCharCode(b)).join(''));
                    let req = `GET ${url.pathname}${url.search} HTTP/1.1\r\n`;
                    req += `Host: ${url.host}\r\n`;
                    req += `Upgrade: websocket\r\n`;
                    req += `Connection: Upgrade\r\n`;
                    req += `Sec-WebSocket-Key: ${secKey}\r\n`;
                    req += `Sec-WebSocket-Version: 13\r\n`;
                    req += `Origin: ${window.location.origin}\r\n\r\n`;

                    this.tunnel.send(new TextEncoder().encode(req));
                }).catch(err => {
                    console.error("[SynWebSocket] Setup failed:", err);
                    this.readyState = 3;
                    const event = new Event('error');
                    if (this.onerror) this.onerror(event);
                    this.dispatchEvent(event);
                });
            }

            send(data) {
                if (this.readyState !== 1) {
                    throw new Error("WebSocket is not in OPEN state");
                }
                const opcode = (typeof data === 'string') ? 1 : 2;
                const frame = encodeWSFrame(data, opcode);
                this.tunnel.send(frame);
            }

            close(code = 1000, reason = "") {
                if (this.readyState === 1) {
                    this.readyState = 2;
                    const frame = encodeWSFrame(new Uint8Array(0), 8);
                    this.tunnel.send(frame);
                }
                setTimeout(() => {
                    if (this.tunnel) this.tunnel.close();
                }, 100);
            }
        }

        const NativeWebSocket = window.WebSocket;
        window.WebSocket = function (url, protocols) {
            const urlStr = String(url);
            if (urlStr === SIGNALING_SERVER_URL) {
                return new NativeWebSocket(url, protocols);
            }
            return new SynWebSocket(urlStr, protocols);
        };
        window.WebSocket.prototype = SynWebSocket.prototype;
        window.WebSocket.CONNECTING = 0;
        window.WebSocket.OPEN = 1;
        window.WebSocket.CLOSING = 2;
        window.WebSocket.CLOSED = 3;

        // ------------------ SW Fetch Message Interception ------------------

        async function init() {
            window.initCalled = true;
            console.log("[Page] init() started");
            if (!('serviceWorker' in navigator)) {
                document.body.innerText = "Service Workers not supported.";
                return;
            }

            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data.type === 'REQUEST') {
                    handleSWRequest(event.data, event.ports[0]);
                }
            });
            navigator.serviceWorker.startMessages();

            try {
                const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
                console.debug('[Page] SW Registered:', reg.scope);

                const startBootstrap = () => {
                    bootstrap().catch(err => {
                        // WebRTC failed; fallback to secure blind tunnel
                        console.warn("[Page] WebRTC bootstrap failed, falling back to blind tunnel:", err.message);
                        reloadContent();
                    });
                };

                if (navigator.serviceWorker.controller) {
                    console.debug('[Page] SW already controlling. Bootstrapping...');
                    startBootstrap();
                } else {
                    console.debug('[Page] Waiting for SW control before bootstrapping...');
                    navigator.serviceWorker.addEventListener('controllerchange', () => {
                        console.debug('[Page] SW took control. Bootstrapping...');
                        startBootstrap();
                    });
                }
            } catch (err) {
                console.error('[Page] SW Registration Failed:', err);
                document.body.innerText = "Initialization Failed.";
            }
        }

        async function bootstrap() {
            if (isConnected) return;
            if (FORCE_TUNNEL) {
                console.debug("[Page] FORCE_TUNNEL is true, bypassing WebRTC signaling and failing bootstrap early to force tunnel fallback.");
                return Promise.reject(new Error("WebRTC bypassed by FORCE_TUNNEL"));
            }
            if (connectionPromise) return connectionPromise;

            connectionPromise = new Promise((resolve, reject) => {
                console.debug("[Page] Connecting to Signaling Server:", SIGNALING_SERVER_URL);
                ws = new NativeWebSocket(SIGNALING_SERVER_URL);

                ws.onopen = () => {
                    console.debug("[Page] WS Open. Registering as:", MY_ID);
                    ws.send(JSON.stringify({ type: "register", id: MY_ID }));
                    startWebRTC(resolve, reject);
                };

                ws.onmessage = async (event) => {
                    const msg = JSON.parse(event.data);
                    handleSignalingMessage(msg);
                };

                ws.onerror = (e) => {
                    console.error("[Page] WS Error:", e);
                    reject(e);
                };

                ws.onclose = () => {
                    console.debug("[Page] WS Closed");
                };
            });

            return connectionPromise.catch(e => {
                console.error("[Page] Bootstrap failed:", e);
                connectionPromise = null;
                isConnected = false;
                throw e;
            });
        }

        async function startWebRTC(resolve, reject) {
            console.debug("[Page] Starting WebRTC...");
            const config = {
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
            };

            peerConnection = new RTCPeerConnection(config);
            peerConnection.createDataChannel("_init");

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    // Vanilla ICE
                }
            };

            peerConnection.onconnectionstatechange = () => {
                console.debug("[Page] Connection State:", peerConnection.connectionState);
                if (peerConnection.connectionState === 'connected') {
                    isConnected = true;
                    reloadContent();
                    resolve();
                } else if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'closed') {
                    isConnected = false;
                    connectionPromise = null;
                    reject(new Error("WebRTC connection state: " + peerConnection.connectionState));
                }
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            if (peerConnection.iceGatheringState !== 'complete') {
                await new Promise(resolve => {
                    const checkState = () => {
                        if (peerConnection.iceGatheringState === 'complete') {
                            peerConnection.removeEventListener('icegatheringstatechange', checkState);
                            resolve();
                        }
                    };
                    peerConnection.addEventListener('icegatheringstatechange', checkState);
                });
            }

            console.debug("[Page] Sending Offer to:", TARGET_PEER_ID);
            ws.send(JSON.stringify({
                type: "offer",
                target: TARGET_PEER_ID,
                sender: MY_ID,
                sdp: peerConnection.localDescription.sdp
            }));
        }

        async function handleSignalingMessage(msg) {
            switch (msg.type) {
                case "answer":
                    await peerConnection.setRemoteDescription(new RTCSessionDescription({
                        type: "answer",
                        sdp: msg.sdp
                    }));
                    break;
                case "candidate":
                    if (msg.candidate) {
                        await peerConnection.addIceCandidate(msg.candidate);
                    }
                    break;
            }
        }

        async function handleSWRequest(reqData, port) {
            try {
                const url = new URL(reqData.url);
                const hostname = url.hostname;
                let hostBase = hostname.endsWith('.localhost') ? hostname.slice(0, -10) : hostname;

                let parts = hostBase.split('-');
                let interfaceName = '';
                if (parts.length > 1 && parts[parts.length - 1].startsWith('i') && parts[parts.length - 1].length > 1) {
                    interfaceName = parts.pop().substring(1);
                }
                let serviceId = TARGET_SERVICE_ID;

                console.debug(`[Page][SW] Intercepted ${reqData.method} ${url.pathname} (interface='${interfaceName}' service='${serviceId}')`);

                const preamble = `http://${interfaceName}|${serviceId}?enc=ecdh-p256&pubkey=placeholder\n`;
                console.debug(`[Page][SW] Preamble to send: ${preamble.trim()}`);

                const { writable, readable } = new TransformStream();
                const responseWriter = writable.getWriter();

                let headerBuffer = new Uint8Array(0);
                let headersParsed = false;

                const onData = async (bytes) => {
                    if (!headersParsed) {
                        const newBuf = new Uint8Array(headerBuffer.length + bytes.length);
                        newBuf.set(headerBuffer, 0);
                        newBuf.set(bytes, headerBuffer.length);
                        headerBuffer = newBuf;

                        const doubleCRLF = findDoubleCRLF(headerBuffer);
                        if (doubleCRLF !== -1) {
                            const headerBytes = headerBuffer.slice(0, doubleCRLF);
                            const bodyBytes = headerBuffer.slice(doubleCRLF + 4);

                            const headerStr = new TextDecoder().decode(headerBytes);
                            const { status, headers } = parseHeaders(headerStr);
                            console.debug(`[Page][SW] Response headers received: status=${status}`);

                            const headerList = [];
                            headers.forEach((v, k) => headerList.push([k, v]));

                            port.postMessage({
                                type: 'RESPONSE',
                                status,
                                headers: headerList,
                                body: readable
                            }, [readable]);

                            headersParsed = true;

                            if (bodyBytes.length > 0) {
                                responseWriter.write(bodyBytes);
                            }
                        }
                    } else {
                        responseWriter.write(bytes);
                    }
                };

                const onClose = () => {
                    try {
                        responseWriter.close();
                    } catch (_) { }
                };

                const tunnel = await connectTunnel(preamble, false, onData, onClose);
                console.debug(`[Page][SW] Tunnel established; sending HTTP request header`);

                const headersMap = new Map();
                for (const [k, v] of reqData.headers) {
                    const lowK = k.toLowerCase();
                    if (lowK.startsWith(':')) continue;
                    headersMap.set(lowK, v);
                }

                let useChunkedEncoding = false;
                if (reqData.body && !headersMap.has('content-length')) {
                    headersMap.set('transfer-encoding', 'chunked');
                    useChunkedEncoding = true;
                }

                if (!headersMap.has('host')) {
                    headersMap.set('host', url.host);
                }
                headersMap.set('connection', 'close');

                let reqStr = `${reqData.method} ${url.pathname + url.search} ${HTTP_VERSION}\r\n`;
                for (const [k, v] of headersMap) {
                    reqStr += `${k}: ${v}\r\n`;
                }
                reqStr += '\r\n';

                console.debug(`[Page][SW] Sending HTTP request header (${reqStr.length} bytes), useChunkedEncoding=${useChunkedEncoding}`);
                await tunnel.send(new TextEncoder().encode(reqStr));

                if (reqData.body) {
                    const reader = reqData.body.getReader();
                    try {
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            if (useChunkedEncoding) {
                                const len = value.byteLength.toString(16);
                                await tunnel.send(new TextEncoder().encode(`${len}\r\n`));
                                await tunnel.send(value);
                                await tunnel.send(new TextEncoder().encode('\r\n'));
                            } else {
                                await tunnel.send(value);
                            }
                        }
                        if (useChunkedEncoding) {
                            await tunnel.send(new TextEncoder().encode('0\r\n\r\n'));
                        }
                    } catch (err) {
                        console.error("Error streaming request body:", err);
                    }
                }
            } catch (e) {
                console.error("SW Request handling failed:", e);
                port.postMessage({ type: 'ERROR', message: e.toString() });
            }
        }

        async function reloadContent() {
            if (!navigator.serviceWorker.controller) {
                console.warn("[Page] SW is not controlling yet. Delaying reloadContent for 100ms...");
                setTimeout(reloadContent, 100);
                return;
            }

            console.debug('[Page] Fetching actual content...');
            const controller = new AbortController();
            try {
                const response = await fetch(window.location.href, {
                    headers: { 'X-Peer-Proxy': 'true' },
                    signal: controller.signal
                });

                console.debug('[Page] Fetched content status:', response.status);

                if (!response.ok) {
                    throw new Error(`Fetch failed with status ${response.statusText} (${response.status})`);
                }

                const contentType = response.headers.get('content-type') || '';

                if (contentType.includes('text/html')) {
                    console.debug('[Page] Got html content, updating page');
                    const html = await response.text();
                    const parser = new DOMParser();
                    const newDoc = parser.parseFromString(html, 'text/html');

                    document.title = newDoc.title;

                    Array.from(newDoc.head.childNodes).forEach(node => {
                        if (node.tagName === 'SCRIPT') {
                            const newScript = document.createElement('script');
                            Array.from(node.attributes).forEach(attr => {
                                newScript.setAttribute(attr.name, attr.value);
                            });
                            if (node.textContent) {
                                newScript.textContent = node.textContent;
                            }
                            document.head.appendChild(newScript);
                        } else {
                            document.head.appendChild(node.cloneNode(true));
                        }
                    });

                    document.body.innerHTML = newDoc.body.innerHTML;

                    const scripts = Array.from(document.body.querySelectorAll('script'));
                    for (const oldScript of scripts) {
                        const newScript = document.createElement('script');
                        for (const attr of oldScript.attributes) {
                            newScript.setAttribute(attr.name, attr.value);
                        }
                        if (oldScript.textContent) {
                            newScript.textContent = oldScript.textContent;
                        }
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    }
                } else {
                    console.debug('[Page] Got non-HTML content, loading in iframe via Blob URL');
                    try {
                        const blob = await response.blob();
                        const url = URL.createObjectURL(blob);
                        document.body.innerHTML = '';
                        const iframe = document.createElement('iframe');
                        iframe.src = url;
                        iframe.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; border:none;';
                        document.body.appendChild(iframe);
                    } catch (blobErr) {
                        console.error('[Page] Failed to create blob for non-HTML content:', blobErr);
                        document.body.innerHTML = `<h3>Load Failed</h3><p>Failed to parse resource.</p><p>${blobErr.message}</p>`;
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') return;
                console.error('[Page] Content Load Failed:', err);
                document.body.innerHTML = `<h3>Connection Failed</h3><p>Failed to load content.</p><p>${err.message}</p>`;
            }
        }

        function findDoubleCRLF(buffer) {
            for (let i = 0; i < buffer.length - 3; i++) {
                if (buffer[i] === 13 && buffer[i + 1] === 10 && buffer[i + 2] === 13 && buffer[i + 3] === 10) {
                    return i;
                }
            }
            return -1;
        }

        function parseHeaders(headerStr) {
            const lines = headerStr.split('\r\n');
            const statusLine = lines[0];
            const statusMatch = statusLine.match(/^HTTP\/[0-9.]+\s+(\d+)\s+(.+)$/);
            const status = statusMatch ? parseInt(statusMatch[1]) : 200;

            const headers = new Headers();
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                if (!line) continue;
                const colon = line.indexOf(':');
                if (colon > 0) {
                    headers.append(line.substring(0, colon).trim(), line.substring(colon + 1).trim());
                }
            }
            return { status, headers };
        }

        window.onload = init;
    </script>
