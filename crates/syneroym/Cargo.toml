[package]
name = "syneroym-substrate"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { workspace = true }
clap = { workspace = true }
anyhow = { workspace = true }
tokio = { workspace = true }
syneroym-identity = { workspace = true }
serde_json = { workspace = true }
dirs = "6.0.0"
toml = "1.0.7"
syneroym-core = { path = "../core" }
syneroym-observability = { path = "../observability" }
syneroym-service-registry = { path = "../service_registry", optional = true }
syneroym-coordinator = { path = "../coordinator", optional = true, default-features = false }
syneroym-app-sandbox = { path = "../app_sandbox", optional = true }
syneroym-http-proxy = { path = "../http_proxy", optional = true }

[features]
default = ["service_registry", "coordinator_all", "app_sandbox", "http_proxy"]
minimal = ["app_sandbox", "http_proxy"]
service_registry = ["dep:syneroym-service-registry"]
app_sandbox = ["dep:syneroym-app-sandbox"]
http_proxy = ["dep:syneroym-http-proxy"]
coordinator = ["dep:syneroym-coordinator"]
coordinator_iroh = ["coordinator", "syneroym-coordinator/iroh"]
coordinator_webrtc = ["coordinator", "syneroym-coordinator/webrtc"]
coordinator_all = ["coordinator", "syneroym-coordinator/all"]

[dev-dependencies]
assert_cmd = "2.0"
libc = "0.2.183"
predicates = "3.1"
tempfile = "3.10"
