[package]
name = "syneroym-control-plane"
version = "0.1.0"
edition = "2024"

[features]
default = ["app_sandbox"]
app_sandbox = ["dep:syneroym-app-sandbox"]

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
syneroym-core = { path = "../core" }
syneroym-rpc = { path = "../rpc" }
syneroym-app-sandbox = { path = "../app_sandbox", optional = true }
serde_json.workspace = true
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
wit-bindgen = "0.55.0"
