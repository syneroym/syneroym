[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/substrate",
    "crates/identity",
    "crates/control_plane",
    "crates/rpc",
    "crates/observability",
    "crates/community_registry",
    "crates/coordinator",
    "crates/coordinator_iroh",
    "crates/coordinator_webrtc",
    "crates/app_sandbox",
    "crates/client_gateway",
    "crates/router",
    "apps/roymctl",
    "test-components/introduce",
]

[profile.dev]
incremental = true # Compile your binary in smaller steps.

[profile.release]
codegen-units = 1 # Allows LLVM to perform better optimization.
lto = true        # Enables link-time-optimizations.
opt-level = "s"   # Prioritizes small binary size. Use `3` if you prefer speed.
panic = "abort"   # Higher performance by disabling panic handlers.
strip = true      # Ensures debug symbols are removed.

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Syneroym Contributors"]
license = "MIT OR Apache-2.0"

[workspace.dependencies]
syneroym-identity = { path = "crates/identity", version = "0.1.0" }

# Networking & Async
tokio = { version = "1.50", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }

# CLI
clap = { version = "4.6", features = ["derive"] }

# Common / Utils
anyhow = "1.0"
reqwest = { version = "0.13", features = ["json"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "json"] }
tracing-appender = "0.2.3"

# Iroh dependencies
iroh-base = "0.97.0"
iroh = "0.97.0"
iroh-relay = { version = "0.97.0", features = ["server"] }
